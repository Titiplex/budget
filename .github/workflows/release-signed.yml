name: Release Signed

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      DATABASE_URL: "file:./prisma/release.db"

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm dpkg

      - name: Restore Windows signing certificate
        if: runner.os == 'Windows' && secrets.WIN_PFX_BASE64 != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$pwd\cert.pfx",
            [Convert]::FromBase64String("${{ secrets.WIN_PFX_BASE64 }}")
          )

      - name: Restore macOS signing certificate
        if: runner.os == 'macOS' && secrets.MAC_CERT_P12_BASE64 != ''
        shell: bash
        run: |
          echo "${{ secrets.MAC_CERT_P12_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/macos-cert.p12"

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$RUNNER_TEMP/macos-cert.p12" \
            -k build.keychain \
            -P "${{ secrets.MAC_CERT_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Restore Apple notarization API key
        if: runner.os == 'macOS' && secrets.APPLE_API_KEY_BASE64 != ''
        shell: bash
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Check project
        run: npm run check

      - name: Build signed artifacts
        run: npm run make:artifacts
        env:
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: make-${{ matrix.os }}
          path: out/make/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Draft Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.zip
            release-artifacts/**/*.nupkg
            release-artifacts/**/RELEASES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}